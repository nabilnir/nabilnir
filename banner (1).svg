<svg viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" width="860" height="280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </radialGradient>

    <!-- Glow filter for dots -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .line { stroke: #4a8eff; stroke-opacity: 0.25; stroke-width: 0.8; }
      .line-bright { stroke: #7ab3ff; stroke-opacity: 0.45; stroke-width: 0.8; }
      .dot { fill: #6aa3ff; }
      .dot-bright { fill: #a8c8ff; }

      /* Node animations - float around */
      @keyframes move1 {
        0%   { transform: translate(0px, 0px); }
        25%  { transform: translate(18px, -12px); }
        50%  { transform: translate(8px, 20px); }
        75%  { transform: translate(-14px, 8px); }
        100% { transform: translate(0px, 0px); }
      }
      @keyframes move2 {
        0%   { transform: translate(0px, 0px); }
        25%  { transform: translate(-20px, 10px); }
        50%  { transform: translate(12px, -18px); }
        75%  { transform: translate(16px, 14px); }
        100% { transform: translate(0px, 0px); }
      }
      @keyframes move3 {
        0%   { transform: translate(0px, 0px); }
        33%  { transform: translate(14px, 16px); }
        66%  { transform: translate(-18px, -8px); }
        100% { transform: translate(0px, 0px); }
      }
      @keyframes move4 {
        0%   { transform: translate(0px, 0px); }
        20%  { transform: translate(-10px, -20px); }
        50%  { transform: translate(22px, 6px); }
        80%  { transform: translate(-8px, 18px); }
        100% { transform: translate(0px, 0px); }
      }
      @keyframes move5 {
        0%   { transform: translate(0px, 0px); }
        30%  { transform: translate(16px, -14px); }
        60%  { transform: translate(-12px, 18px); }
        100% { transform: translate(0px, 0px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; r: 2.5; }
        50% { opacity: 1; r: 3.5; }
      }
      @keyframes pulseBig {
        0%, 100% { opacity: 0.5; r: 3.5; }
        50% { opacity: 0.9; r: 5; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes linePulse {
        0%, 100% { stroke-opacity: 0.18; }
        50% { stroke-opacity: 0.5; }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      .n1 { animation: move1 14s ease-in-out infinite; }
      .n2 { animation: move2 17s ease-in-out infinite; }
      .n3 { animation: move3 12s ease-in-out infinite; }
      .n4 { animation: move4 19s ease-in-out infinite; }
      .n5 { animation: move5 15s ease-in-out infinite; }
      .n6 { animation: move1 22s ease-in-out infinite reverse; }
      .n7 { animation: move3 18s ease-in-out infinite reverse; }
      .n8 { animation: move2 13s ease-in-out infinite; }
      .n9 { animation: move4 16s ease-in-out infinite reverse; }
      .n10 { animation: move5 20s ease-in-out infinite; }
      .n11 { animation: move1 11s ease-in-out infinite reverse; }
      .n12 { animation: move2 24s ease-in-out infinite; }
      .n13 { animation: move3 16s ease-in-out infinite; }
      .n14 { animation: move4 21s ease-in-out infinite reverse; }
      .n15 { animation: move5 13s ease-in-out infinite reverse; }
      .n16 { animation: move1 18s ease-in-out infinite; }
      .n17 { animation: move2 15s ease-in-out infinite reverse; }
      .n18 { animation: move3 23s ease-in-out infinite; }
      .n19 { animation: move5 17s ease-in-out infinite reverse; }
      .n20 { animation: move4 14s ease-in-out infinite; }

      .lp { animation: linePulse 4s ease-in-out infinite; }
      .lp2 { animation: linePulse 6s ease-in-out infinite 1s; }
      .lp3 { animation: linePulse 5s ease-in-out infinite 2s; }

      .txt-name {
        animation: fadeIn 1.2s ease-out 0.3s both;
        font-family: 'Georgia', serif;
        font-size: 38px;
        font-weight: bold;
        fill: #ffffff;
        filter: url(#textglow);
      }
      .txt-title {
        animation: fadeIn 1.2s ease-out 0.7s both;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #7ab3ff;
        letter-spacing: 3px;
      }
      .txt-email {
        animation: fadeIn 1.2s ease-out 1.1s both;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #5a8acc;
        letter-spacing: 1px;
      }
      .divider {
        animation: fadeIn 1.2s ease-out 0.9s both;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="url(#bg)"/>

  <!-- Static connection lines between node positions (drawn first, behind nodes) -->
  <!-- These approximate static connections; the nodes move so lines look dynamic -->
  <g opacity="0.3">
    <line class="line lp"  x1="80"  y1="60"  x2="180" y2="100"/>
    <line class="line lp2" x1="180" y1="100" x2="260" y2="50"/>
    <line class="line lp"  x1="260" y1="50"  x2="340" y2="140"/>
    <line class="line lp3" x1="340" y1="140" x2="420" y2="80"/>
    <line class="line lp2" x1="420" y1="80"  x2="520" y2="130"/>
    <line class="line lp"  x1="520" y1="130" x2="620" y2="60"/>
    <line class="line lp3" x1="620" y1="60"  x2="720" y2="110"/>
    <line class="line lp2" x1="720" y1="110" x2="800" y2="50"/>
    <line class="line lp"  x1="800" y1="50"  x2="840" y2="140"/>

    <line class="line lp3" x1="80"  y1="60"  x2="140" y2="160"/>
    <line class="line lp"  x1="140" y1="160" x2="220" y2="220"/>
    <line class="line lp2" x1="220" y1="220" x2="340" y2="200"/>
    <line class="line lp3" x1="340" y1="200" x2="460" y2="240"/>
    <line class="line lp"  x1="460" y1="240" x2="560" y2="200"/>
    <line class="line lp2" x1="560" y1="200" x2="660" y2="240"/>
    <line class="line lp3" x1="660" y1="240" x2="760" y2="210"/>
    <line class="line lp"  x1="760" y1="210" x2="840" y2="240"/>

    <line class="line lp2" x1="180" y1="100" x2="140" y2="160"/>
    <line class="line lp"  x1="260" y1="50"  x2="220" y2="220"/>
    <line class="line lp3" x1="340" y1="140" x2="340" y2="200"/>
    <line class="line lp2" x1="420" y1="80"  x2="460" y2="240"/>
    <line class="line lp"  x1="520" y1="130" x2="560" y2="200"/>
    <line class="line lp3" x1="620" y1="60"  x2="660" y2="240"/>
    <line class="line lp2" x1="720" y1="110" x2="760" y2="210"/>

    <!-- Extra cross connections -->
    <line class="line lp"  x1="140" y1="160" x2="260" y2="50"/>
    <line class="line lp3" x1="220" y1="220" x2="340" y2="140"/>
    <line class="line lp2" x1="460" y1="240" x2="520" y2="130"/>
    <line class="line lp"  x1="560" y1="200" x2="620" y2="60"/>
    <line class="line lp3" x1="660" y1="240" x2="720" y2="110"/>
    <line class="line lp2" x1="760" y1="210" x2="800" y2="50"/>

    <!-- Right cluster -->
    <line class="line lp"  x1="800" y1="50"  x2="760" y2="210"/>
    <line class="line lp3" x1="840" y1="140" x2="760" y2="210"/>
    <line class="line lp2" x1="840" y1="140" x2="720" y2="110"/>

    <!-- Top center cluster -->
    <line class="line lp"  x1="420" y1="80"  x2="340" y2="140"/>
    <line class="line lp3" x1="420" y1="80"  x2="340" y2="200"/>

    <!-- Extra sparse lines -->
    <line class="line lp2" x1="50"  y1="180" x2="140" y2="160"/>
    <line class="line lp"  x1="50"  y1="180" x2="80"  y2="60"/>
    <line class="line lp3" x1="50"  y1="180" x2="220" y2="220"/>

    <line class="line lp"  x1="480" y1="30"  x2="420" y2="80"/>
    <line class="line lp3" x1="480" y1="30"  x2="520" y2="130"/>
    <line class="line lp2" x1="480" y1="30"  x2="340" y2="140"/>

    <line class="line lp"  x1="700" y1="170" x2="660" y2="240"/>
    <line class="line lp3" x1="700" y1="170" x2="760" y2="210"/>
    <line class="line lp2" x1="700" y1="170" x2="720" y2="110"/>
    <line class="line lp"  x1="700" y1="170" x2="620" y2="60"/>
  </g>

  <!-- Bright accent lines -->
  <g opacity="0.5">
    <line class="line-bright lp2" x1="260" y1="50"  x2="340" y2="140"/>
    <line class="line-bright lp"  x1="520" y1="130" x2="620" y2="60"/>
    <line class="line-bright lp3" x1="340" y1="140" x2="460" y2="240"/>
    <line class="line-bright lp2" x1="700" y1="170" x2="720" y2="110"/>
  </g>

  <!-- NODES (dots at intersections) -->
  <g filter="url(#glow)">
    <!-- Each node group is independently animated -->
    <g class="n1">  <circle cx="80"  cy="60"  r="2.5" class="dot" style="animation: pulse 3s ease-in-out infinite;"/> </g>
    <g class="n2">  <circle cx="180" cy="100" r="3"   class="dot-bright" style="animation: pulseBig 4s ease-in-out infinite;"/> </g>
    <g class="n3">  <circle cx="260" cy="50"  r="2.5" class="dot" style="animation: pulse 3.5s ease-in-out infinite 0.5s;"/> </g>
    <g class="n4">  <circle cx="340" cy="140" r="4"   class="dot-bright" style="animation: pulseBig 5s ease-in-out infinite 1s;"/> </g>
    <g class="n5">  <circle cx="420" cy="80"  r="2.5" class="dot" style="animation: pulse 4s ease-in-out infinite 0.3s;"/> </g>
    <g class="n6">  <circle cx="520" cy="130" r="3"   class="dot" style="animation: pulse 3.2s ease-in-out infinite 0.8s;"/> </g>
    <g class="n7">  <circle cx="620" cy="60"  r="3.5" class="dot-bright" style="animation: pulseBig 4.5s ease-in-out infinite 0.2s;"/> </g>
    <g class="n8">  <circle cx="720" cy="110" r="2.5" class="dot" style="animation: pulse 3.8s ease-in-out infinite 1.2s;"/> </g>
    <g class="n9">  <circle cx="800" cy="50"  r="2"   class="dot" style="animation: pulse 4.2s ease-in-out infinite;"/> </g>
    <g class="n10"> <circle cx="840" cy="140" r="2.5" class="dot" style="animation: pulse 3.6s ease-in-out infinite 0.6s;"/> </g>

    <g class="n11"> <circle cx="140" cy="160" r="2.5" class="dot" style="animation: pulse 3.3s ease-in-out infinite 0.4s;"/> </g>
    <g class="n12"> <circle cx="220" cy="220" r="3"   class="dot-bright" style="animation: pulseBig 5.5s ease-in-out infinite 0.7s;"/> </g>
    <g class="n13"> <circle cx="340" cy="200" r="2.5" class="dot" style="animation: pulse 4.1s ease-in-out infinite 0.9s;"/> </g>
    <g class="n14"> <circle cx="460" cy="240" r="3"   class="dot" style="animation: pulse 3.7s ease-in-out infinite 0.1s;"/> </g>
    <g class="n15"> <circle cx="560" cy="200" r="2.5" class="dot" style="animation: pulse 4.4s ease-in-out infinite 1.4s;"/> </g>
    <g class="n16"> <circle cx="660" cy="240" r="2"   class="dot" style="animation: pulse 3.1s ease-in-out infinite 0.5s;"/> </g>
    <g class="n17"> <circle cx="760" cy="210" r="3.5" class="dot-bright" style="animation: pulseBig 4.8s ease-in-out infinite 1.1s;"/> </g>
    <g class="n18"> <circle cx="840" cy="240" r="2"   class="dot" style="animation: pulse 3.9s ease-in-out infinite 0.3s;"/> </g>
    <g class="n19"> <circle cx="50"  cy="180" r="2.5" class="dot" style="animation: pulse 4.6s ease-in-out infinite 0.8s;"/> </g>
    <g class="n20"> <circle cx="480" cy="30"  r="2"   class="dot" style="animation: pulse 3.4s ease-in-out infinite 0.2s;"/> </g>

    <!-- Extra scattered nodes -->
    <g class="n3">  <circle cx="700" cy="170" r="4"   class="dot-bright" style="animation: pulseBig 5.2s ease-in-out infinite 0.6s;"/> </g>
    <g class="n7">  <circle cx="100" cy="240" r="2"   class="dot" style="animation: pulse 4.3s ease-in-out infinite 1.3s;"/> </g>
    <g class="n11"> <circle cx="600" cy="270" r="2"   class="dot" style="animation: pulse 3.5s ease-in-out infinite 0.7s;"/> </g>
  </g>

  <!-- Text content - left aligned, vertically centered -->
  <g>
    <!-- Subtle left accent bar -->
    <rect class="divider" x="52" y="88" width="3" height="100" rx="1.5" fill="#4a8eff" opacity="0.7"/>

    <text class="txt-name" x="70" y="135">Nabil Mahmud</text>

    <text class="txt-title" x="72" y="158">FRONTEND WEB DEVELOPER</text>

    <!-- Divider line -->
    <line class="divider" x1="72" y1="170" x2="340" y2="170" stroke="#4a8eff" stroke-opacity="0.3" stroke-width="0.8"/>

    <text class="txt-email" x="72" y="188">nirarhan@gmail.com</text>
  </g>
</svg>
